<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:">
  <title>Дошка</title>
  <link rel="stylesheet" href="../styles.css">
  
 <style>
  .board-window-body {
      overflow: hidden; 
      background: var(--bg-light); 
  }
  .board-container {
    flex: 1;
    height: calc(100vh - 40px);
    position: relative;
    overflow: hidden;
    background-color: #ffffff; /* ВАЖЛИВО: Білий фон, щоб гумка стирала до білого */
  }
  #board-canvas {
    position: absolute; top: 0; left: 0;
    touch-action: none;
    width: 100%; height: 100%;
    /* Кастомний маленький хрестик */
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><line x1="8" y1="0" x2="8" y2="16" stroke="black" stroke-width="1"/><line x1="0" y1="8" x2="16" y2="8" stroke="black" stroke-width="1"/><rect x="7" y="7" width="2" height="2" fill="white"/></svg>') 8 8, crosshair;
  }
  
  /* === Тулбар === */
  .floating-toolbar {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(43, 45, 49, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px;
    padding: 6px 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 50; display: flex; align-items: center; gap: 12px;
    transition: transform 0.3s ease, opacity 0.3s ease, left 0.3s ease;
  }

  /* Стилі для прихованого (docked) тулбару */
  .floating-toolbar.docked-left {
    left: 0 !important;
    transform: translateX(calc(-100% + 24px)) !important; /* Залишаємо тільки ручку */
    opacity: 0.6;
  }
  .floating-toolbar.docked-left:hover {
    transform: translateX(0) !important; /* Виїжджає при наведенні */
    opacity: 1;
  }
  .floating-toolbar.docked-right {
    left: 100% !important;
    transform: translateX(-24px) !important;
    opacity: 0.6;
  }
  .floating-toolbar.docked-right:hover {
    transform: translateX(-100%) !important;
    opacity: 1;
  }

  .toolbar-group { display: flex; align-items: center; gap: 6px; }
  
  .toolbar-drag-handle {
    cursor: grab; width: 14px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0.7; color: var(--text-secondary); font-size: 20px;
  }
  .toolbar-drag-handle::after { content: '⋮'; }

  .toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
  .tool-btn {
    width: 36px; height: 36px; padding: 0; font-size: 18px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid transparent; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.1s;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .tool-btn.active { background: var(--accent); color: white; }
  .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  
  .toolbar-group label { color: var(--muted); font-size: 12px; font-weight: 600; }
  .toolbar-group input[type='color'] { width: 32px; height: 32px; padding: 0; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; overflow: hidden; cursor: pointer; }
  .toolbar-group input[type='range'] { width: 80px; accent-color: var(--accent); }
  .toolbar-group select.input { padding: 4px 8px; width: 100px; font-size: 13px; height: 32px; background: var(--bg); color: var(--text-primary); border: 1px solid var(--border-color); }
  
  .board-text-input {
    position: absolute; z-index: 100; background: transparent; color: #000;
    border: 2px dashed var(--accent); padding: 4px; font-family: Segoe UI, sans-serif;
    outline: none; resize: none; display: none; min-width: 50px; min-height: 30px;
    overflow: hidden; line-height: 1.2; white-space: pre-wrap;
  }
</style>
</head>
<body class="board-window-body">
  <div class="titlebar">
    <div class="title" id="board-title">🎨 <b>Дошка</b></div>
    <div class="controls">
      <button class="ctrl" id="board-win-min">—</button>
      <button class="ctrl" id="board-win-max">▢</button>
      <button class="ctrl" id="board-win-close">✕</button>
    </div>
  </div>

  <div class="board-container" id="board-container">
    <canvas id="board-canvas-bg" style="position: absolute; top: 0; left: 0; z-index: 0;"></canvas>
    <canvas id="board-canvas" style="position: absolute; top: 0; left: 0; z-index: 1;"></canvas>

    <div class="floating-toolbar" id="floating-toolbar" style="z-index: 50;">
       <div class="toolbar-drag-handle" id="toolbar-drag-handle" title="Перетягніть до краю, щоб закріпити"></div>
       <div class="toolbar-group">
        <button class="btn tool-btn" id="tool-undo" disabled>↩️</button>
        <button class="btn tool-btn" id="tool-redo" disabled>↪️</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="btn tool-btn" id="tool-hand" title="Рука (H)">✋</button>
        <button class="btn tool-btn" id="tool-select" title="Виділення (V)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="btn tool-btn active" id="tool-pen" title="Олівець (P)">✏️</button>
        <button class="btn tool-btn" id="tool-eraser" title="Гумка (E)">🧼</button>
        <button class="btn tool-btn" id="tool-shape-cycle" title="Фігури (S)">📐</button>
        <button class="btn tool-btn" id="tool-text" title="Текст (T)"><b>Aa</b></button>
        <button class="btn tool-btn" id="tool-image" title="Фото (I)">🖼️</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group" id="pen-settings">
        <input type="color" id="tool-color" value="#FF0000">
        <input type="range" id="tool-stroke" min="1" max="50" value="5" title="Товщина">
        <span id="stroke-value" style="font-size: 12px; width: 20px; text-align: center;">5</span>
      </div>
      <div class="toolbar-group" id="eraser-settings" style="display: none;">
        <input type="range" id="tool-eraser-stroke" min="5" max="150" value="30" title="Розмір гумки">
        <span id="eraser-stroke-value" style="font-size: 12px; width: 25px; text-align: center;">30</span>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <select class="input" id="template-select" title="Фон">
          <option value="blank">Чистий</option>
          <option value="grid">Клітинка</option>
          <option value="lines">Лінійка</option>
          <option value="dark">Темний</option>
        </select>
      </div>
    </div> 
    
    <textarea id="text-input-overlay" class="board-text-input" style="z-index: 100;"></textarea>

    <div style="display: none;">
       <div id="icon-line"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg></div>
      <div id="icon-rect"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>
      <div id="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></div>
      <div id="icon-triangle"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l10 18H2z"/></svg></div>
      <div id="icon-cylinder"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3c4.97 0 9 1.343 9 3s-4.03 3-9 3-9-1.343-9-3 4.03-3 9-3z"/><path d="M3 6v12c0 1.657 4.03 3 9 3s9-1.343 9-3V6"/><path d="M3 13c0 1.66 4 3 9 3s9-1.34 9-3"/></svg></div>
      <div id="icon-star"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div id="icon-rhombus"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 12 12 22 22 12 12 2"/></svg></div>
      <div id="icon-hexagon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 5v10l-9 5-9-5V7z"/></svg></div>
      <div id="icon-arrow"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </div>
  </div>> 
  <script src="board_renderer.js" type="module"></script>
</body>
</html>
